name: Windows release build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source and bundled libraries
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MinGW build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-mingw-w64-x86-64

      - name: Configure release
        run: >
          cmake -S . -B build-windows-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/mingw64.toolchain
          -DCLIENT=ON
          -DSERVER=OFF
          -DTOOLS=OFF
          -DVULKAN=OFF
          -DPREFER_BUNDLED_LIBS=ON

      - name: Build portable Windows ZIP
        run: cmake --build build-windows-release --target package_default --parallel 2

      - name: Upload Windows release
        uses: actions/upload-artifact@v4
        with:
          name: TClient-AiTrain-Windows-x64
          path: build-windows-release/*.zip
          if-no-files-found: error
          retention-days: 14
